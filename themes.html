<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Themes — CubeTimer</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root{
    --page-bg:#08080c;
    --page-surface:#100f16;
    --page-border:#211f2c;
    --page-text:#e8e8f0;
    --page-muted:#6b6b8a;
    --page-accent:#6c63ff;
  }

  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(108,99,255,.10), transparent 60%),
      radial-gradient(1000px 500px at 100% 0%, rgba(255,101,132,.08), transparent 55%),
      var(--page-bg);
    color:var(--page-text);
    font-family:'Segoe UI', system-ui, sans-serif;
    min-height:100vh;
  }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 28px;
    border-bottom:1px solid var(--page-border);
    background:rgba(16,15,22,.7);
    backdrop-filter:blur(6px);
    position:sticky;
    top:0;
    z-index:5;
  }
  .logo{ font-size:1rem; font-weight:700; color:var(--page-accent); letter-spacing:1px; }
  .back-link{
    font-size:.75rem;
    color:var(--page-muted);
    text-decoration:none;
    border:1px solid var(--page-border);
    padding:6px 14px;
    border-radius:6px;
    transition:all .2s;
  }
  .back-link:hover{ color:var(--page-text); border-color:var(--page-accent); }

  main{
    max-width:1080px;
    margin:0 auto;
    padding:56px 28px 80px;
  }

  .hero{ text-align:center; margin-bottom:48px; }
  .hero-eyebrow{
    font-size:.65rem;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--page-accent);
    margin-bottom:10px;
    font-weight:700;
  }
  .hero h1{
    font-size:2.4rem;
    font-weight:200;
    letter-spacing:-1px;
    margin-bottom:10px;
  }
  .hero h1 b{ font-weight:700; color:var(--page-accent); }
  .hero p{ color:var(--page-muted); font-size:.9rem; }

  .grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:20px;
  }
  @media (max-width:820px){ .grid{ grid-template-columns:repeat(2, 1fr); } }
  @media (max-width:560px){ .grid{ grid-template-columns:1fr; } }

  /* ===== THEME CARD (each is a scoped live mini-preview) ===== */
  .card{
    position:relative;
    border-radius:16px;
    padding:1px;
    background:linear-gradient(135deg, var(--t-accent), transparent 40%, var(--t-accent2) 100%);
    cursor:pointer;
    transition:transform .25s ease;
  }
  .card:hover{ transform:translateY(-4px); }
  .card.active{ transform:translateY(-2px); }

  .card-inner{
    background:var(--t-bg);
    border-radius:15px;
    padding:18px 16px 16px;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    overflow:hidden;
  }

  .card-inner::before{
    content:'';
    position:absolute;
    inset:0;
    background:radial-gradient(180px 120px at 50% 0%, var(--t-accent-glow), transparent 70%);
    opacity:.5;
    pointer-events:none;
  }

  .check{
    position:absolute;
    top:10px;
    right:10px;
    width:20px; height:20px;
    border-radius:50%;
    background:var(--t-accent);
    color:var(--t-bg);
    font-size:.65rem;
    font-weight:900;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:2;
  }
  .card.active .check{ display:flex; }

  .theme-name{
    font-size:.8rem;
    font-weight:700;
    color:var(--t-text);
    letter-spacing:.3px;
    margin-bottom:2px;
    z-index:1;
  }
  .theme-tag{
    font-size:.6rem;
    color:var(--t-muted);
    text-transform:uppercase;
    letter-spacing:1.5px;
    margin-bottom:14px;
    z-index:1;
  }

  .mini-scramble{
    font-size:.62rem;
    font-weight:600;
    color:var(--t-muted);
    letter-spacing:1px;
    margin-bottom:8px;
    z-index:1;
  }
  .mini-scramble span{ color:var(--t-text); margin:0 2px; }

  .mini-timer{
    font-size:2.6rem;
    font-weight:200;
    font-variant-numeric:tabular-nums;
    letter-spacing:-1px;
    color:var(--t-text);
    text-shadow:0 0 40px var(--t-accent-glow);
    z-index:1;
    line-height:1;
    margin-bottom:12px;
  }

  .mini-chips{
    display:flex;
    gap:8px;
    margin-bottom:14px;
    z-index:1;
  }
  .mini-chip{
    background:var(--t-surface2);
    border:1px solid var(--t-border);
    border-radius:6px;
    padding:4px 9px;
    text-align:center;
    min-width:44px;
  }
  .mini-chip .v{ font-size:.68rem; font-weight:700; color:var(--t-accent2); }
  .mini-chip .l{ font-size:.5rem; color:var(--t-muted); text-transform:uppercase; letter-spacing:1px; }

  .swatches{
    display:flex;
    gap:5px;
    margin-bottom:14px;
    z-index:1;
  }
  .swatch{ width:14px; height:14px; border-radius:4px; border:1px solid rgba(255,255,255,.08); }

  .use-btn{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:none;
    background:var(--t-accent);
    color:var(--t-bg);
    font-size:.72rem;
    font-weight:700;
    letter-spacing:.3px;
    cursor:pointer;
    z-index:1;
    transition:opacity .15s, transform .1s;
  }
  .use-btn:hover{ opacity:.88; }
  .use-btn:active{ transform:scale(.98); }
  .card.active .use-btn{ background:var(--t-green); }

  .toast{
    position:fixed;
    bottom:28px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--page-surface);
    border:1px solid var(--page-border);
    color:var(--page-text);
    padding:12px 22px;
    border-radius:10px;
    font-size:.8rem;
    opacity:0;
    pointer-events:none;
    transition:all .3s ease;
    display:flex;
    align-items:center;
    gap:8px;
    z-index:50;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .toast b{ color:var(--page-accent); }
</style>
</head>
<body>

<header>
  <div class="logo">⬛ CUBETIMER</div>
  <a class="back-link" href="index.html">← Back to Timer</a>
</header>

<main>
  <div class="hero">
    <div class="hero-eyebrow">Appearance</div>
    <h1>Pick a <b>theme</b> for your solves</h1>
    <p>Every card below is a live preview — click one to apply it instantly.</p>
  </div>

  <div class="grid" id="grid"></div>
</main>

<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script>
const THEMES = [
  {
    id: 'violet',
    name: 'Violet Storm',
    tag: 'Default',
    vars: {
      '--bg':'#0a0a0f', '--surface':'#13131a', '--surface2':'#1c1c28',
      '--accent':'#6c63ff', '--accent2':'#ff6584', '--text':'#e8e8f0',
      '--muted':'#6b6b8a', '--green':'#00e676', '--red':'#ff5252',
      '--yellow':'#ffd740', '--border':'#2a2a3d',
      '--pro':'#f5c842', '--pro-dim':'rgba(245,200,66,0.12)'
    }
  },
  {
    id: 'solar',
    name: 'Solar Blaze',
    tag: 'Warm',
    vars: {
      '--bg':'#100a06', '--surface':'#1a110a', '--surface2':'#241a10',
      '--accent':'#ff7a3d', '--accent2':'#ffcf5c', '--text':'#fdf1e6',
      '--muted':'#9a7a5e', '--green':'#8bd450', '--red':'#ff4d4d',
      '--yellow':'#ffcf5c', '--border':'#3a2a1a',
      '--pro':'#ffcf5c', '--pro-dim':'rgba(255,207,92,0.14)'
    }
  },
  {
    id: 'frost',
    name: 'Arctic Frost',
    tag: 'Cool',
    vars: {
      '--bg':'#070c12', '--surface':'#0f1720', '--surface2':'#16212c',
      '--accent':'#3fc7ff', '--accent2':'#8fe3ff', '--text':'#e9f6ff',
      '--muted':'#5c7a8d', '--green':'#4fe0c4', '--red':'#ff6b6b',
      '--yellow':'#ffd76a', '--border':'#1d3040',
      '--pro':'#8fe3ff', '--pro-dim':'rgba(143,227,255,0.14)'
    }
  },
  {
    id: 'cyber',
    name: 'Neon Cyber',
    tag: 'Loud',
    vars: {
      '--bg':'#08050f', '--surface':'#120b1f', '--surface2':'#1c1030',
      '--accent':'#ff2fd0', '--accent2':'#28f0ff', '--text':'#f2e9ff',
      '--muted':'#6f5c8f', '--green':'#39ff9c', '--red':'#ff3b6a',
      '--yellow':'#f8ff3b', '--border':'#2a1a45',
      '--pro':'#28f0ff', '--pro-dim':'rgba(40,240,255,0.14)'
    }
  },
  {
    id: 'forest',
    name: 'Forest Moss',
    tag: 'Earthy',
    vars: {
      '--bg':'#080c08', '--surface':'#0f150f', '--surface2':'#171f16',
      '--accent':'#6fcf6f', '--accent2':'#c9d97a', '--text':'#e9f2e6',
      '--muted':'#6f8768', '--green':'#7fe07f', '--red':'#e07a5f',
      '--yellow':'#d9c96a', '--border':'#22301f',
      '--pro':'#c9d97a', '--pro-dim':'rgba(201,217,122,0.14)'
    }
  },
  {
    id: 'mono',
    name: 'Mono Ink',
    tag: 'Minimal',
    vars: {
      '--bg':'#0b0b0c', '--surface':'#141415', '--surface2':'#1d1d1f',
      '--accent':'#e8e8ec', '--accent2':'#9a9aa4', '--text':'#f2f2f4',
      '--muted':'#68686f', '--green':'#8fe0a8', '--red':'#e08f8f',
      '--yellow':'#e0d18f', '--border':'#242426',
      '--pro':'#e8e8ec', '--pro-dim':'rgba(232,232,236,0.10)'
    }
  }
];

const grid = document.getElementById('grid');
const active = localStorage.getItem('cubetimer-theme-id') || 'violet';

function render(){
  grid.innerHTML = THEMES.map(t => `
    <div class="card ${t.id===active?'active':''}" data-id="${t.id}"
      style="
        --t-bg:${t.vars['--bg']}; --t-surface:${t.vars['--surface']}; --t-surface2:${t.vars['--surface2']};
        --t-accent:${t.vars['--accent']}; --t-accent2:${t.vars['--accent2']}; --t-text:${t.vars['--text']};
        --t-muted:${t.vars['--muted']}; --t-green:${t.vars['--green']}; --t-red:${t.vars['--red']};
        --t-yellow:${t.vars['--yellow']}; --t-border:${t.vars['--border']};
        --t-accent-glow:${t.vars['--accent']}55;
      ">
      <div class="card-inner">
        <div class="check">✓</div>
        <div class="theme-name">${t.name}</div>
        <div class="theme-tag">${t.tag}</div>
        <div class="mini-scramble"><span>R</span><span>U'</span><span>F2</span><span>L</span><span>D'</span></div>
        <div class="mini-timer" data-timer>0.00</div>
        <div class="mini-chips">
          <div class="mini-chip"><div class="v">12.4</div><div class="l">Ao5</div></div>
          <div class="mini-chip"><div class="v">13.1</div><div class="l">Ao12</div></div>
        </div>
        <div class="swatches">
          <div class="swatch" style="background:${t.vars['--accent']}"></div>
          <div class="swatch" style="background:${t.vars['--accent2']}"></div>
          <div class="swatch" style="background:${t.vars['--green']}"></div>
          <div class="swatch" style="background:${t.vars['--yellow']}"></div>
          <div class="swatch" style="background:${t.vars['--red']}"></div>
        </div>
        <button class="use-btn">${t.id===active?'Currently Active':'Use This Theme'}</button>
      </div>
    </div>
  `).join('');

  // fake ticking timers for life / "epic" feel
  document.querySelectorAll('[data-timer]').forEach(el=>{
    let ms = Math.random()*3000;
    setInterval(()=>{
      ms += 30;
      if(ms > 20000) ms = Math.random()*2000;
      const s = Math.floor(ms/1000), c = Math.floor((ms%1000)/10);
      el.textContent = `${s}.${c.toString().padStart(2,'0')}`;
    }, 30);
  });

  grid.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click', ()=> applyTheme(card.dataset.id));
  });
}

function applyTheme(id){
  const theme = THEMES.find(t=>t.id===id);
  if(!theme) return;
  localStorage.setItem('cubetimer-theme-id', id);
  localStorage.setItem('cubetimer-theme-vars', JSON.stringify(theme.vars));
  document.querySelectorAll('.card').forEach(c=>{
    c.classList.toggle('active', c.dataset.id===id);
    c.querySelector('.use-btn').textContent = c.dataset.id===id ? 'Currently Active' : 'Use This Theme';
  });
  showToast(theme.name);
}

function showToast(name){
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').innerHTML = `<b>${name}</b> applied — head back to the timer to see it`;
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>toast.classList.remove('show'), 2600);
}

render();
</script>

</body>
</html>
